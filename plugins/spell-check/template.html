<div class="spell-check-notice">
  Showing results for <strong>{{corrected}}</strong> <br />
  <a
    data-spell-link
    href="{{search_url}}"
    data-original="{{original}}"
    data-skip="{{skip_endpoint}}"
    >Search instead for <em>{{original}}</em></a
  >
</div>
<script>
  (function () {
    var link = document.querySelector("[data-spell-link]");
    if (!link) return;
    link.addEventListener("click", function (e) {
      e.preventDefault();
      var q = link.dataset.original;
      var endpoint = link.dataset.skip;
      var href = link.href;
      fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ q: q }),
      }).finally(function () {
        window.location.assign(href);
      });
    });
  })();
</script>
